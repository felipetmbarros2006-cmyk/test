<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>LifeAI • Dashboard</title>

  <!-- FONT -->
  <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">


  <link rel="stylesheet" href="static/css/styles.css">
</head>

<body>

  <div class="dashboard-layout">

    <!--IMPORTANTE:
      A sidebar será carregada futuramente
      da pasta partials.
    -->

    <aside class="sidebar">

      
      <div class="sidebar-logo">

        
        <h2>LifeAI</h2>

      </div>

      
      <nav class="sidebar-menu">

        <a href="#" class="sidebar-item active">
          Dashboard
        </a>

        <a href="#" class="sidebar-item">
          Novo Exame
        </a>

        <a href="#" class="sidebar-item">
          Exames
        </a>

        <a href="#" class="sidebar-item">
          Fila de Prioridade
        </a>

        <a href="#" class="sidebar-item">
          Relatórios
        </a>

        <a href="#" class="sidebar-item">
          Configurações
        </a>

      </nav>

    </aside>

    
    <main class="dashboard-content">

      
      <section class="dashboard-cards">

        
        <div class="dashboard-card">

          <div class="card-header">

            <span class="card-title">
              TOTAL EXAMES
            </span>

            <div class="card-icon success-icon">
              ✓
            </div>

          </div>

          <h2 class="card-number">
            8
          </h2>

        </div>

        
        <div class="dashboard-card critical-card">

          <div class="card-header">

            <span class="card-title">
              URGENTES
            </span>

            <div class="card-icon critical-icon">
              ▲
            </div>

          </div>

          <h2 class="card-number critical-number">
            2
          </h2>

        </div>

        
        <div class="dashboard-card">

          <div class="card-header">

            <span class="card-title">
              EXAMES ANALISADOS
            </span>

            <div class="card-icon success-icon">
              ✓
            </div>

          </div>

          <h2 class="card-number">
            8
          </h2>

        </div>

        
        <div class="dashboard-card">

          <div class="card-header">

            <span class="card-title">
              FILA ATUAL
            </span>

            <div class="card-icon success-icon">
              ✓
            </div>

          </div>

          <h2 class="card-number">
            8
          </h2>

        </div>

      </section>

    </main>

  </div>

</body>
</html>
