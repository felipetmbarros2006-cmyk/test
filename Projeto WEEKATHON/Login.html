<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeAI - Login</title>

  <!-- SF Pro Fonts -->
  <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">

  <link rel="stylesheet" href="static/CSS/styles.css" />
</head>
<body>

  <main class="login-page">

    <section class="login-card">

      <div class="logo-area">
        <!-- ############################ -->
        <!-- # COLOQUE A LOGO AQUI # -->
        <!-- ############################ -->

        <!-- EXEMPLO -->
        <!-- <img src="logo.png" alt="LifeAI Logo" class="logo"> -->

        <div class="logo-placeholder">
            
        </div>
      </div>

      <div class="login-header">
        <h1>Bem-Vindo ao LifeAI</h1>
        <p>
          Plataforma médica inteligente para análise operacional.
        </p>
      </div>

      <form class="login-form">

        <div class="input-group">
          <label for="email">CRM ou E-mail</label>
          <input
            type="text"
            id="email"
            placeholder="Digite seu CRM ou E-mail"
          />
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            placeholder="Digite sua senha"
          />
        </div>
<div class="form-options">

  <label class="remember">
    <input type="checkbox">
    <span>Lembrar-me</span>
  </label>

  <a href="#" class="forgot-password">
    Esqueceu a senha?
  </a>

</div>

<a href="dashboard.html" class="btn-primary">
  Entrar
</a>

      </form>

      <div class="register-link">
        <span>Ainda não tem conta?</span>
        <a href="Criar_conta.html">Criar conta</a>
      </div>

    </section>

  </main>

</body>
</html>
